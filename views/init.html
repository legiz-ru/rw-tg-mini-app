<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Загрузка...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; color: #555; }
        .dark { background-color: #18222d; color: #aabac7; }
    </style>
</head>
<body>
    <div id="loader">Проверка данных...</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                Telegram.WebApp.ready();

                // Применяем тему сразу
                if (Telegram.WebApp.colorScheme === 'dark') {
                    document.body.classList.add('dark');
                }

                const initData = Telegram.WebApp.initData;

                if (!initData) {
                    document.getElementById('loader').innerText = 'Ошибка: приложение должно быть открыто в Telegram.';
                    return;
                }

                fetch('/auth/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: initData }),
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'ACTIVE' && data.html) {
                        // Заменяем все содержимое страницы на полученный HTML
                        document.open();
                        document.write(data.html);
                        document.close();
                    } else if (data.redirectUrl) {
                        // Если сервер сказал перенаправить (например, на страницу покупки)
                        window.location.href = data.redirectUrl;
                    } else {
                         throw new Error('Некорректный ответ от сервера.');
                    }
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    document.getElementById('loader').innerText = 'Ошибка сети. Попробуйте перезапустить приложение.';
                });

            } catch (e) {
                // Этот блок сработает, если Telegram.WebApp не определен (открыто не в Telegram)
                // Хотя сервер уже должен был отдать nontg.html, это дополнительная защита.
                document.getElementById('loader').innerText = 'Ошибка инициализации. Откройте приложение в Telegram.';
            }
        });
    </script>
</body>
</html>
