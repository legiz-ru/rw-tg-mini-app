<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= metaTitle %></title>
    <meta name="description" content="<%= metaDescription %>">
    <script>
        // Данные о подписке будут здесь в формате Base64
        const panelData = "<%= panelData %>";

        // Декодируем Base64 и парсим JSON
        let decodedData = {};
        try {
            decodedData = JSON.parse(atob(panelData));
        } catch (e) {
            console.error("Ошибка при декодировании данных:", e);
        }

        // Функция для отображения данных на странице
        function renderPanelData(data) {
            const container = document.getElementById('panel-output');
            container.textContent = JSON.stringify(data, null, 2);
        }

        // Ждём загрузки DOM и выводим данные
        document.addEventListener('DOMContentLoaded', () => {
            renderPanelData(decodedData);
        });
    </script>
</head>
<body>
    <h1>Ваши подписки</h1>
    <pre id="panel-output" style="background: #f5f5f5; padding: 1em; border-radius: 5px;"></pre>
</body>
</html>
